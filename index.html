<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Luxseetarot — Lettura dei Tarocchi</title>
<meta name="description" content="Tre carte. Una domanda. Una lettura su misura." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0b0a14;
    --bg:#0b0a14;
    --bg-2:#15122a;
    --gold:#d4af6a;
    --gold-soft:rgba(212,175,106,.55);
    --gold-faint:rgba(212,175,106,.18);
    --fg:#ece6d8;
    --muted:#9a91a8;
    --shadow-arcane: 0 30px 80px -20px rgba(212,175,106,.18), 0 10px 40px -10px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:radial-gradient(ellipse at top, #1a1430 0%, #0b0a14 60%, #050410 100%);color:var(--fg);font-family:'Inter',sans-serif;min-height:100%;}
  body{overflow-x:hidden;min-height:100vh;}
  .display{font-family:'Cinzel',serif;letter-spacing:.08em}
  .serif{font-family:'Cormorant Garamond',serif}
  .gold{color:var(--gold)}
  .muted{color:var(--muted)}

  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  #stars span{position:absolute;border-radius:50%;background:var(--gold);opacity:.5;animation:twinkle 4s infinite ease-in-out}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.85}}

  main{position:relative;z-index:1}
  header{padding:40px 24px 24px;text-align:center}
  .brand{display:inline-flex;align-items:center;gap:14px;color:var(--gold-soft);font-family:'Cinzel',serif;letter-spacing:.5em;font-size:11px}
  .brand svg{width:14px;height:14px;opacity:.8}
  h1.title{font-family:'Cinzel',serif;font-weight:600;font-size:clamp(28px,5vw,46px);margin:18px 0 10px;color:var(--gold);letter-spacing:.06em}
  .subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);font-size:clamp(14px,2.2vw,17px);max-width:520px;margin:0 auto}

  section.phase{position:relative;z-index:2;padding:8px 16px 80px;display:none;opacity:0;transform:translateY(14px);filter:blur(6px);transition:opacity 2.4s ease,transform 2.4s ease,filter 2.4s ease}
  section.phase.active{display:block}
  section.phase.visible{opacity:1;transform:translateY(0);filter:blur(0)}
  #veil{position:fixed;inset:0;background:radial-gradient(ellipse at center,#0b0a14 0%,#050410 100%);opacity:0;pointer-events:none;z-index:9999;transition:opacity 1.8s ease}
  #veil.on{opacity:1;pointer-events:auto}

  form.card-form{max-width:440px;margin:24px auto 0;background:rgba(20,16,40,.55);backdrop-filter:blur(10px);border:1px solid var(--gold-faint);border-radius:18px;padding:32px;box-shadow:var(--shadow-arcane)}
  .phase-tag{text-align:center;font-family:'Cinzel',serif;letter-spacing:.3em;font-size:11px;color:var(--gold-soft)}
  h2.subtitle-h{font-family:'Cinzel',serif;text-align:center;font-size:18px;margin:8px 0 24px;color:var(--fg);font-weight:500;letter-spacing:.08em}
  label{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  input,textarea{width:100%;background:rgba(11,10,20,.6);border:1px solid rgba(212,175,106,.28);border-radius:10px;padding:12px 14px;color:var(--fg);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border .2s,box-shadow .2s}
  input:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,106,.15)}
  textarea{resize:none;min-height:96px}
  .field{margin-bottom:18px}
  .err{color:#ff8a8a;font-size:12px;text-align:center;margin:6px 0}

  button.gold-btn,a.gold-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#e6c587,#b88a3e);color:#1a1208;border:none;border-radius:12px;padding:14px 28px;font-family:'Cinzel',serif;letter-spacing:.25em;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:transform .2s,box-shadow .2s,opacity .2s;box-shadow:0 0 30px rgba(212,175,106,.25)}
  button.gold-btn:hover,a.gold-btn:hover{transform:translateY(-1px);box-shadow:0 0 50px rgba(212,175,106,.45)}
  button.gold-btn[disabled]{opacity:.5;cursor:not-allowed;transform:none}
  button.gold-btn.full{width:100%}

  .privacy{font-family:'Cormorant Garamond',serif;font-style:italic;text-align:center;color:var(--muted);font-size:15px;line-height:1.5;margin-top:18px}

  .fan-wrap{position:relative;width:100%;max-width:1200px;height:240px;margin:32px auto 0;display:block;overflow:visible;padding:0 12px}
  .fan-card{position:absolute;top:20px;left:50%;width:50px;height:80px;border-radius:8px;cursor:pointer;transition:transform .6s cubic-bezier(.22,1,.36,1),filter .3s;transform-origin:50% 100%;will-change:transform;border:none;background:none;padding:0;margin-left:-25px}
  .fan-card .back{display:block;width:100%;height:100%;border-radius:12px;background:linear-gradient(135deg,#2b1b4a 0%,#1a1230 50%,#0e0820 100%);border:1px solid var(--gold-soft);box-shadow:0 8px 30px rgba(0,0,0,.6),inset 0 0 30px rgba(212,175,106,.08);position:relative;overflow:hidden}
  .fan-card .back::before{content:"";position:absolute;inset:6px;border:1px solid var(--gold-faint);border-radius:8px}
  .fan-card .back::after{content:"✦";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:28px;text-shadow:0 0 14px rgba(212,175,106,.6)}
  .fan-card.selected{filter:drop-shadow(0 0 24px rgba(212,175,106,.55))}
  .fan-card.selected .back{border-color:var(--gold)}
  .fan-card[disabled]{cursor:not-allowed;opacity:.6}

  .reveal-btn-wrap{display:flex;justify-content:center;margin-top:-40px;position:relative;z-index:50;opacity:0;transform:translateY(20px);transition:opacity .8s,transform .8s}
  .reveal-btn-wrap.show{opacity:1;transform:translateY(0)}

  .three-cards{display:flex;justify-content:center;gap:18px;margin:24px auto 36px;perspective:1200px}
  .flip{width:110px;height:175px;perspective:1200px}
  .flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform 1.4s cubic-bezier(.22,1,.36,1)}
  .flip.flipped .flip-inner{transform:rotateY(180deg)}
  .flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;overflow:hidden}
  .flip-face.front{background:linear-gradient(135deg,#2b1b4a 0%,#1a1230 50%,#0e0820 100%);border:1px solid var(--gold-soft);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:0}
  .flip-face.front::before{content:"";position:absolute;inset:8px;border:1px solid var(--gold-faint);border-radius:10px}
  .flip-face.back{transform:rotateY(180deg);background:linear-gradient(160deg,#1c1638 0%,#0e0820 100%);border:1px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:14px 8px;text-align:center}
  .flip-face.back .name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.12em;color:var(--gold);line-height:1.3}
  .flip-face.back .sigil svg{width:56px;height:56px;stroke:var(--gold);fill:none;stroke-width:1.2}

  .reading-box{max-width:720px;margin:0 auto;padding:0 8px;font-family:'Cormorant Garamond',serif;font-size:17px;line-height:1.7;color:#ece6d8}
  .reading-box p{margin:0 0 6px !important; line-height:1.5;}
  .reading-box strong{color:var(--gold);font-family:'Cinzel',serif;letter-spacing:.08em;font-weight:600}
  .loader{text-align:center;color:var(--muted);font-style:italic;margin:32px 0}
  .spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--gold-faint);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-right:10px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .cta-box{max-width:560px;margin:48px auto 0;background:linear-gradient(135deg,rgba(43,27,74,.7),rgba(20,16,40,.85));border:1px solid var(--gold-soft);border-radius:18px;padding:28px;text-align:center;box-shadow:var(--shadow-arcane);opacity:0;transform:translateY(20px);transition:opacity 1s,transform 1s}
  .cta-box.show{opacity:1;transform:translateY(0)}
  .restart{display:block;margin:22px auto 0;background:none;border:none;color:var(--muted);font-size:11px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer}
  .restart:hover{color:var(--gold)}
</style>
</head>
<body>
<div id="stars"></div>
<div id="veil"></div>
<main>
  <header>
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span>LUXSEETAROT</span>
    </div>
    <h1 class="title">Lettura dei Tarocchi</h1>
  </header>

  <section class="phase active" id="phase-input">
    <form class="card-form" id="form">
      <div class="field"><label>Nome</label><input id="name" maxlength="80" required /></div>
      <div class="field"><label>Data di nascita</label><input id="birth" type="date" required /></div>
      <div class="field"><label>La tua domanda</label><textarea id="q" maxlength="600" required></textarea></div>
      <button type="submit" class="gold-btn full">INIZIA LA LETTURA</button>
    </form>
  </section>

  <section class="phase" id="phase-select">
    <div class="fan-wrap" id="fan"></div>
    <div class="reveal-btn-wrap" id="reveal-btn-wrap"><button class="gold-btn" id="reveal-btn">✦ SCOPRI LA RISPOSTA</button></div>
  </section>

  <section class="phase" id="phase-reveal">
    <div class="three-cards" id="three-cards"></div>
    <div id="reading-area">
      <div class="loader" id="loader"><span class="spinner"></span>Le carte si stanno componendo...</div>
      <div class="reading-box" id="reading"></div>
    </div>
    <div class="cta-box" id="cta">
      <p class="cta-text">La lettura è solo l'inizio. C'è un nodo che solo un consulto umano può sciogliere.</p>
      <a href="#" class="gold-btn">ACCEDI AL CONSULTO PRIVATO ORA →</a>
      <button class="restart" id="restart">◦ Nuova lettura ◦</button>
    </div>
  </section>
</main>

</script>
</body>
</html>
